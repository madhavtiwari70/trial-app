# Spin Dynamics (TFIM) — demo data file
# Edit the values below to change the demo. No code changes needed.

simulation:
  n_qubits: 6          # length of the spin chain
  n_steps: 5            # Trotter steps per circuit
  t_max: 3.0             # max simulation time
  n_points: 6            # number of time points sampled (keep small for local sim)
  shots: 5000             # measurement shots per circuit

backend:
  use_cloud: false        # true = run on QoroService, false = local simulator

# Each experiment is one physical regime to simulate.
# initial_state: "zeros" or a bitstring like "101010" (per-qubit custom state)
experiments:
  - name: "Ferromagnetic Phase"
    J: 1.0
    h: 0.2
    initial_state: "zeros"

  - name: "Paramagnetic Phase"
    J: 1.0
    h: 2.0
    initial_state: "zeros"

  - name: "Néel State Dynamics"
    J: 1.0
    h: 0.5
    initial_state: "101010"
