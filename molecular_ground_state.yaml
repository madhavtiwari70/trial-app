# Molecular Ground State (VQE) — demo data file
# Edit the values below to change the demo. No code changes needed.

molecule:
  symbols: ["H", "H"]              # atomic symbols
  coordinates:                     # one [x, y, z] per atom, in Angstrom
    - [0, 0, 0]
    - [0, 0, 0.735]

vqe:
  n_layers: 2
  optimizer_method: "COBYLA"       # any scipy.optimize method name, e.g. COBYLA, Nelder-Mead
  max_iterations: 30
  seed: 42

backend:
  use_cloud: false     # true = run on QoroService, false = local simulator
  shots: 5000
