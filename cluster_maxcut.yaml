# Cluster MaxCut — demo data file
# Edit the values below to change the demo. No code changes needed.

graph:
  n_qubits: 20        # number of nodes ("qubits") in the graph
  n_clusters: 4         # number of communities
  inter_edges: 10         # edges connecting different clusters
  p_intra: 0.3              # density of edges within each cluster
  seed: 42

qaoa:
  n_layers: 2
  max_iterations: 5
  population_size: 50    # Monte Carlo optimizer population
  n_best_sets: 5

partitioning:
  minimum_n_clusters: 4
  algorithm: "spectral"

backend:
  use_cloud: false     # true = run on QoroService, false = local simulator
  shots: 50000            # only used when use_cloud is true
